apiVersion: apps/v1
kind: Deployment
metadata:
  name: telegram-worker
  labels:
    app: telegram-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telegram-worker
  template:
    metadata:
      labels:
        app: telegram-worker
    spec:
      containers:
        - name: telegram-worker
          image: registry/your-chatbot-image:latest
          command: ["python", "worker.py"]
          env:
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: telegram-bot-secret
                  key: bot_token
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
